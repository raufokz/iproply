name: Deploy to Hostinger via SSH

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.HOSTINGER_SSH_KEY }}
          SSH_HOST: ${{ secrets.HOSTINGER_HOST }}
          SSH_PORT: ${{ secrets.HOSTINGER_PORT }}
        run: |
          set -euo pipefail
          test -n "$SSH_PRIVATE_KEY" || { echo "Missing HOSTINGER_SSH_KEY secret"; exit 1; }
          test -n "$SSH_HOST" || { echo "Missing HOSTINGER_HOST secret"; exit 1; }
          test -n "$SSH_PORT" || { echo "Missing HOSTINGER_PORT secret"; exit 1; }
          install -m 700 -d ~/.ssh
          echo "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p "$SSH_PORT" "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Test SSH connectivity
        env:
          SSH_HOST: ${{ secrets.HOSTINGER_HOST }}
          SSH_PORT: ${{ secrets.HOSTINGER_PORT }}
          SSH_USER: ${{ secrets.HOSTINGER_USER }}
        run: |
          set -euo pipefail
          echo "Testing ssh to $SSH_USER@$SSH_HOST:$SSH_PORT ..."
          ssh -4 -o ConnectTimeout=15 -o BatchMode=yes -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "echo ok"

      - name: Sync files to server
        run: |
          export RSYNC_RSH="ssh -4 -p ${{ secrets.HOSTINGER_PORT }} -o ConnectTimeout=20"
          rsync -avz --delete \
            --exclude ".git" \
            --exclude ".github" \
            --exclude "node_modules" \
            --exclude ".env" \
            ./ ${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }}:${{ secrets.HOSTINGER_PATH }}

      - name: Run database migrations on server
        env:
          SSH_HOST: ${{ secrets.HOSTINGER_HOST }}
          SSH_PORT: ${{ secrets.HOSTINGER_PORT }}
          SSH_USER: ${{ secrets.HOSTINGER_USER }}
          DEPLOY_PATH: ${{ secrets.HOSTINGER_PATH }}
          DB_HOST: ${{ secrets.HOSTINGER_DB_HOST }}
          DB_USER: ${{ secrets.HOSTINGER_DB_USER }}
          DB_PASS: ${{ secrets.HOSTINGER_DB_PASSWORD }}
          DB_NAME: ${{ secrets.HOSTINGER_DB_NAME }}
        run: |
          set -euo pipefail
          if [[ -z "${DB_HOST:-}" || -z "${DB_USER:-}" || -z "${DB_PASS:-}" || -z "${DB_NAME:-}" || -z "${DEPLOY_PATH:-}" ]]; then
            echo "::warning::Skipping database migrations — add secrets HOSTINGER_DB_HOST, HOSTINGER_DB_USER, HOSTINGER_DB_PASSWORD, HOSTINGER_DB_NAME (and ensure HOSTINGER_PATH is set)."
            exit 0
          fi
          echo "Applying SQL migrations via SSH (${SSH_USER}@${SSH_HOST}:${SSH_PORT}) ..."
          Q_DEPLOY="$(printf '%q' "$DEPLOY_PATH")"
          Q_HOST="$(printf '%q' "$DB_HOST")"
          Q_USER="$(printf '%q' "$DB_USER")"
          Q_PASS="$(printf '%q' "$DB_PASS")"
          Q_NAME="$(printf '%q' "$DB_NAME")"
          ssh -4 -p "$SSH_PORT" -o ConnectTimeout=30 -o BatchMode=yes "$SSH_USER@$SSH_HOST" \
            "set -euo pipefail && cd ${Q_DEPLOY} && chmod +x database/migrations/run_all_migrations.sh 2>/dev/null || true && MYSQL_HOST=${Q_HOST} MYSQL_USER=${Q_USER} MYSQL_PASSWORD=${Q_PASS} MYSQL_DATABASE=${Q_NAME} bash database/migrations/run_all_migrations.sh"

      # Uncomment if you need Composer on the server
      # - name: Install Composer dependencies on server
      #   run: |
      #     ssh -p ${{ secrets.HOSTINGER_PORT }} ${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }} "cd ${{ secrets.HOSTINGER_PATH }} && composer install --no-dev --optimize-autoloader"
